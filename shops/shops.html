<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickDash — Shop Cards & Local Stores</title>
  <meta name="description" content="Browse local registered shops near you on QuickDash. Shop local, live better." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../discover/discover.css" />
  <link rel="stylesheet" href="shops.css" />
</head>
<body>

  <!-- ───────────────────────────────────────── HEADER ── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">

      <!-- Logo -->
      <a href="../discover/discover.html" class="brand-logo" id="logo-link">
        <div class="logo-badge">Q</div>
        <span class="logo-name">QuickDash</span>
      </a>

      <!-- Search Bar (filters shops on this page) -->
      <div class="search-wrapper" id="search-wrapper">
        <div class="search-bar" id="search-bar">
          <span class="search-icon">🔍</span>
          <input
            type="search"
            id="search-input"
            class="search-input"
            placeholder='Search store name or category...'
            autocomplete="off"
            oninput="handleStoreSearch()"
          />
          <button class="search-clear" id="search-clear" style="display:none;" onclick="clearStoreSearch()">✕</button>
        </div>
      </div>

      <!-- Quick-Access Header Cart Button -->
      <a href="../cart/cart.html" class="btn-header-cart" id="header-cart-btn" aria-label="Go to cart">
        <span class="cart-icon">🛒</span>
        <span class="cart-badge-count" id="header-cart-count">0</span>
      </a>

      <!-- Auth / Profile Button -->
      <div class="header-auth" id="header-auth">
        <!-- Filled by JS based on login state -->
      </div>

    </div>
  </header>

  <!-- ───────────────────────────────── LOCATION BAR ── -->
  <div class="location-bar">
    <div class="location-bar-inner">
      <button class="location-btn" id="location-btn" onclick="detectLocation()">
        <span class="loc-pin">📍</span>
        <span id="location-label">Market Center, New Delhi</span>
        <span class="loc-change">Change</span>
      </button>
      <span class="delivery-tag">⚡ Delivery in 10–30 mins</span>
    </div>
  </div>

  <!-- ───────────────────────────────────── MAIN CONTENT ── -->
  <main>
    
    <!-- Hero / Intro -->
    <div class="shops-intro-section">
      <div class="intro-headline-row">
        <h1 class="page-title">Local Shop Cards</h1>
        <div class="category-badge-pill" id="active-category-pill" style="display: none;">
          Category: <span id="category-pill-text">Grocery</span>
          <button onclick="clearCategoryFilter()" class="clear-pill-btn">✕</button>
        </div>
      </div>
      <p class="page-subtitle">Supporting local stores near your doorstep. Select a store to view their full catalog.</p>
    </div>

    <!-- ──────────────────────── STORES SHOWCASE ── -->
    <section class="stores-section">
      
      <!-- Near Me Section -->
      <div class="stores-group-section" id="section-near-me">
        <h2 class="stores-group-title">Near me <span class="group-count-badge" id="count-near-me">0</span></h2>
        <div class="stores-grid" id="grid-near-me">
          <!-- Injected dynamically by JS -->
        </div>
      </div>

      <!-- Other Stores Section -->
      <div class="stores-group-section" id="section-other-stores">
        <h2 class="stores-group-title">Other stores <span class="group-count-badge" id="count-other-stores">0</span></h2>
        <div class="stores-grid" id="grid-other-stores">
          <!-- Injected dynamically by JS -->
        </div>
      </div>

    </section>

  </main>

  <div id="footer-mount" data-variant="full"></div>
  <div id="drawer-mount"></div>

  <!-- Sleek Floating Bottom Navigation Dock -->
  <div class="floating-nav-dock">
    <a href="../discover/discover.html" class="nav-dock-item" id="nav-dock-discover">
      <span class="nav-dock-icon">🏠</span>
      <span class="nav-dock-label">Discover</span>
    </a>
    <a href="../shops/shops.html" class="nav-dock-item active" id="nav-dock-shops">
      <span class="nav-dock-icon">🏪</span>
      <span class="nav-dock-label">Shops</span>
    </a>
    <a href="../orders/orders.html" class="nav-dock-item" id="nav-dock-orders">
      <span class="nav-dock-icon">📦</span>
      <span class="nav-dock-label">Orders</span>
    </a>
  </div>

  <script src="../shared/database.js"></script>
  <script src="../shared/components.js"></script>
  <script src="../shared/partner-register.js"></script>
  <script src="shops.js"></script>
</body>
</html>
