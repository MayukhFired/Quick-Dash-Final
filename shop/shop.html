<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuickDash — Buy Local Products</title>
  <meta name="description" content="Order local items directly from your favorite neighborhood shop on QuickDash." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../discover/discover.css" />
  <link rel="stylesheet" href="shop.css" />
</head>
<body>

  <!-- ───────────────────────────────────────── HEADER ── -->
  <header class="site-header" id="site-header">
    <div class="header-inner">

      <!-- Logo -->
      <a href="../discover/discover.html" class="brand-logo" id="logo-link">
        <div class="logo-badge">Q</div>
        <span class="logo-name">QuickDash</span>
      </a>

      <!-- Shop Title Placeholder (Replaces search box in center) -->
      <div class="header-shop-title-container" id="header-shop-title-container">
        <h2 class="header-shop-name" id="header-shop-name">Loading Store...</h2>
        <span class="header-shop-rating" id="header-shop-rating">⭐ 0.0</span>
      </div>

      <!-- Auth / Profile Button -->
      <div class="header-auth" id="header-auth">
        <!-- Filled by JS based on login state -->
      </div>

    </div>
  </header>

  <!-- ───────────────────────────────── LOCATION BAR ── -->
  <div class="location-bar">
    <div class="location-bar-inner">
      <div class="location-display">
        <span class="loc-pin">📍</span>
        <span id="location-label">Market Center, New Delhi</span>
      </div>
      <span class="delivery-tag">⚡ Delivery in 10–30 mins</span>
    </div>
  </div>

  <!-- ───────────────────────────────────── MAIN CONTENT ── -->
  <main class="shop-details-container">
    
    <!-- Shop Info Hero Card -->
    <div class="shop-info-hero" id="shop-info-hero">
      <!-- Generated Dynamically by JS -->
    </div>

    <!-- ──────────────────────── SORTING PANEL ── -->
    <div class="sorting-controls-wrapper">
      <span class="sort-label">🔍 Sort Products:</span>
      <div class="sorting-options">
        <button class="sort-btn active" data-sort="default" onclick="handleSortChange('default', this)">Most Ordered</button>
        <button class="sort-btn" data-sort="price-low" onclick="handleSortChange('price-low', this)">Price: Low to High</button>
        <button class="sort-btn" data-sort="price-high" onclick="handleSortChange('price-high', this)">Price: High to Low</button>
        <button class="sort-btn" data-sort="top-rated" onclick="handleSortChange('top-rated', this)">Top Rated</button>
      </div>
    </div>

    <!-- ──────────────────────── PRODUCTS CATEGORIZED VIEW ── -->
    <div class="shop-catalog-sections" id="shop-catalog-sections">
      <!-- Dynamic Products Grid Grouped by Category Divisions -->
    </div>

  </main>

  <div id="footer-mount" data-variant="full"></div>
  <div id="drawer-mount"></div>

  <!-- ──────────────────────── FLOATING SHOPPING CART OVERLAY ── -->
  <div class="floating-cart-bar" id="floating-cart-bar">
    <div class="cart-bar-inner">
      <div class="cart-summary-info">
        <span class="cart-bar-icon">🛒</span>
        <div class="cart-meta-text">
          <span class="cart-bar-qty" id="cart-bar-qty">0 items</span>
          <span class="cart-bar-total" id="cart-bar-total">₹0</span>
        </div>
      </div>
      <button class="btn-cart-checkout" onclick="handleCheckout()">Checkout Order →</button>
    </div>
  </div>

  <!-- ──────────────────────── SINGLE-SHOP WARNING ALERT MODAL ── -->
  <div class="modal-overlay" id="warning-modal">
    <div class="modal-card">
      <div class="modal-icon">⚠️</div>
      <h3 class="modal-title">Replace items in cart?</h3>
      <p class="modal-body-text">
        Your cart already contains items from <strong id="warning-prev-shop">another store</strong>.
        QuickDash only allows ordering from <strong>one shop at a time</strong>.
      </p>
      <div class="modal-actions">
        <button class="btn-modal-cancel" onclick="closeWarningModal()">Cancel</button>
        <button class="btn-modal-confirm" onclick="confirmCartClearAndSwap()">Clear & Add Item</button>
      </div>
    </div>
  </div>

  <script src="../shared/database.js"></script>
  <script src="../shared/components.js"></script>
  <script src="../shared/partner-register.js"></script>
  <script src="shop.js"></script>
</body>
</html>
